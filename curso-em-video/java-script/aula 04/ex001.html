<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 001</title>
    <style>
        body {
            background-color: rgb(105, 105, 173);
            color: white;
            font: normal 20pt Arial;
        }
    </style>
</head>

<body>
    <header>
        <h1>Hello, world!</h1>
    </header>
    <main>
        <p>Já me livrei da maldição</p>
    </main>

    <footer>
        <p>Direitos reservados a Robs Enterprise</p>
    </footer>
    <script>
        var n1 = 'eu'
        var n2 = 'te'
        var n3 = 'amo'

        window.alert('Minha primeira mensagem')
        window.confirm('Está gostando de JavaScript?')
        window.prompt('Qual é seu nome?')
        window.alert(`${n1} ${n2} ${n3} muito, desde sempre. `)
        window.document.write('Eu estou testando onde isso vai aparecer')
    </script>
</body>

</html>
