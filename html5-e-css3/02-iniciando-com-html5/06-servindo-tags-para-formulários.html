<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Servindo tags para formulários</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header></header>

    <main>
        <form>
            <fieldset>
                <legend>Meu formulário</legend>

                <p>
                    Insira seu nome: <input type="text">
                </p>
                <p>
                    Insira seu e-mail: <input type="e-mail">
                </p>

                <p>
                    Insira sua senha: <input type="password">
                </p>
                <p>
                    Insira seu sexo <br>
                    <input type="radio" name="sexo"> Masculino <br>
                    <input type="radio" name="sexo"> Feminino
                </p>
                <p>
                    Insira sua tecnologia preferida <br>
                    <input type="checkbox"> HTML5 <br>
                    <input type="checkbox"> CSS3 <br>
                    <input type="checkbox"> PHP <br>
                    <input type="checkbox"> JQuery <br>
                    <input type="checkbox"> JavaScript

                </p>
                <p>
                    <button type="submit">Validar!</button>
                </p>
            </fieldset>
        </form>
    </main>
</body>


</html>
